<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>4th of July Quiz Showdown</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="stars-bg" aria-hidden="true"></div>

<div id="eagle-transition" class="eagle-transition hidden" aria-hidden="true">
  <span class="eagle-emoji">🦅</span>
  <span class="eagle-screech">SCREEEEE</span>
</div>

<!-- SETUP SCREEN -->
<section id="screen-setup" class="screen active">
  <div class="content">
    <h1>🎆 4th of July<br>Quiz Showdown 🎆</h1>
    <p class="subtitle">Yell your answers. The quizmaster taps the winner.</p>

    <div class="setup-card">
      <label class="setup-label" for="target-slider">
        Correct answers needed to win: <span id="target-value">15</span> / <span id="total-value">24</span>
      </label>
      <input type="range" id="target-slider" min="1" max="24" value="15">

      <button id="btn-test-voice" class="btn btn-secondary">🔊 Hear the Narrator</button>
    </div>

    <button id="btn-start" class="btn btn-primary btn-large">Start the Showdown</button>
  </div>
</section>

<!-- QUIZ SCREEN -->
<section id="screen-quiz" class="screen">
  <div class="quiz-header">
    <span id="question-progress">Question 1 / 24</span>
    <span id="category-badge" class="category-badge">History</span>
    <span id="score-tracker">✅ 0/24 · need 15</span>
  </div>

  <div class="quiz-body">
    <h2 id="question-text">Question text goes here</h2>
    <div id="options" class="options-grid">
      <button class="option-btn" data-idx="0"><span class="option-letter">A</span><span class="option-text"></span></button>
      <button class="option-btn" data-idx="1"><span class="option-letter">B</span><span class="option-text"></span></button>
      <button class="option-btn" data-idx="2"><span class="option-letter">C</span><span class="option-text"></span></button>
      <button class="option-btn" data-idx="3"><span class="option-letter">D</span><span class="option-text"></span></button>
    </div>
    <p id="fun-fact" class="fun-fact hidden"></p>
  </div>

  <div class="control-bar">
    <button id="btn-replay" class="btn btn-ghost">🔊 Replay Question</button>
    <button id="btn-next" class="btn btn-primary hidden">Next Question →</button>
  </div>
</section>

<!-- RESULTS SCREEN -->
<section id="screen-results" class="screen">
  <div class="content">
    <h1 id="results-headline">🎆 Results 🎆</h1>
    <p id="results-score" class="results-score">You got 0 / 24 correct</p>
    <p id="results-message" class="results-message"></p>
    <button id="btn-restart" class="btn btn-primary btn-large">Play Again</button>
  </div>
</section>

<audio id="narrator-audio" preload="none"></audio>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
